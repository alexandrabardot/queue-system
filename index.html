<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: #555; margin-bottom: 8px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .number { font-size: 72px; font-weight: bold; color: #2563eb; margin: 8px 0; line-height: 1; }
    .serving-number { font-size: 72px; font-weight: bold; color: #16a34a; margin: 8px 0; line-height: 1; }
    .waiting-number { font-size: 48px; font-weight: bold; color: #d97706; margin: 8px 0; line-height: 1; }
    .sub { color: #999; font-size: 13px; margin-top: 6px; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
    }
    button:active { background: #1d4ed8; }
    .row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }
    .row .card { flex: 1; padding: 20px 12px; }
    .row .number-sm { font-size: 48px; font-weight: bold; margin: 6px 0; line-height: 1; }
    .green { color: #16a34a; }
    .amber { color: #d97706; }
  </style>
</head>
<body>

  <!-- Now Serving + Waiting side by side -->
  <div class="row">
    <div class="card">
      <h2>Serving</h2>
      <div class="number-sm green" id="serving">---</div>
      <div class="sub" id="serving-status">Checking...</div>
    </div>
    <div class="card">
      <h2>Waiting</h2>
      <div class="number-sm amber" id="waiting">--</div>
      <div class="sub">in queue</div>
    </div>
  </div>

  <!-- Get Your Number -->
  <div class="card">
    <h2>Get Your Number</h2>
    <div class="number" id="my-number">---</div>
    <div class="sub" id="my-status">Tap the button to join the queue.</div>
    <button onclick="getNumber()">Get My Number</button>
  </div>

  <script>
    const BASE_URL = '';

    function getNumber() {
      document.getElementById('my-status').textContent = 'Getting number...';
      fetch(BASE_URL + '/get_queue.php')
        .then(r => r.text())
        .then(num => {
          document.getElementById('my-number').textContent = num.trim();
          document.getElementById('my-status').textContent = 'Please wait for your number to be called.';
        })
        .catch(() => {
          document.getElementById('my-status').textContent = 'Error. Please try again.';
        });
    }

    function checkStatus() {
      // Check serving
      fetch(BASE_URL + '/current_api.php')
        .then(r => r.text())
        .then(num => {
          document.getElementById('serving').textContent = num.trim();
          document.getElementById('serving-status').textContent = 'Updated just now';
        })
        .catch(() => {
          document.getElementById('serving-status').textContent = 'Could not connect';
        });

      // Check waiting count
      fetch(BASE_URL + '/waiting_api.php')
        .then(r => r.text())
        .then(count => {
          document.getElementById('waiting').textContent = count.trim();
        })
        .catch(() => {
          document.getElementById('waiting').textContent = '--';
        });
    }

    checkStatus();
    setInterval(checkStatus, 3000);
  </script>
</body>
</html>
