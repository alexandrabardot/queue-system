<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      margin-bottom: 20px;
    }
    h2 { color: #333; margin-bottom: 8px; font-size: 18px; }
    .number { font-size: 64px; font-weight: bold; color: #2563eb; margin: 16px 0; }
    .serving-number { font-size: 64px; font-weight: bold; color: #16a34a; margin: 16px 0; }
    p { color: #666; font-size: 14px; margin-bottom: 20px; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }
    button:active { background: #1d4ed8; }
    .status { font-size: 13px; color: #999; margin-top: 12px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Now Serving</h2>
    <div class="serving-number" id="serving">---</div>
    <div class="status" id="serving-status">Checking...</div>
  </div>

  <div class="card">
    <h2>Get Your Number</h2>
    <p>Tap the button to get your queue number.</p>
    <div class="number" id="my-number">---</div>
    <button onclick="getNumber()">Get My Number</button>
    <div class="status" id="my-status"></div>
  </div>

  <script>
    const BASE_URL = '';  // same server, relative path

    function getNumber() {
      document.getElementById('my-status').textContent = 'Getting number...';
      fetch(BASE_URL + '/get_queue.php')
        .then(r => r.text())
        .then(num => {
          document.getElementById('my-number').textContent = num.trim();
          document.getElementById('my-status').textContent = 'Please wait for your number to be called.';
        })
        .catch(() => {
          document.getElementById('my-status').textContent = 'Error. Please try again.';
        });
    }

    function checkServing() {
      fetch(BASE_URL + '/current_api.php')
        .then(r => r.text())
        .then(num => {
          document.getElementById('serving').textContent = num.trim();
          document.getElementById('serving-status').textContent = 'Updated just now';
        })
        .catch(() => {
          document.getElementById('serving-status').textContent = 'Could not connect';
        });
    }

    checkServing();
    setInterval(checkServing, 3000);
  </script>
</body>
</html>
