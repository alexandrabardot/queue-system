<!DOCTYPE html>
<html>
<head>
    <title>Queue System</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <h1>QUEUE SYSTEM</h1>

    <button onclick="getQueue()" style="font-size:20px; padding:10px;">
        GET NUMBER
    </button>

    <h2 id="result">Press button to get number</h2>

    <script>
        function getQueue() {
            fetch('get_queue.php')
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerHTML = "Your Number: " + data;
            })
            .catch(error => {
                document.getElementById("result").innerHTML = "ERROR";
                console.log(error);
            });
        }
    </script>

</body>
</html>
